:    Add date-time stamp to files
     for %i in (!&) do cscript .\addVersionInfo.js "%~dpnxi"
:    Speech recognition (.wav to .txt)
     for %i in (!&) do py .\wav_to_txt.py %i
:    Speech recognition (.mp4 to .txt)
     for %i in (!&) do @%FFmpegPath%ffmpeg.exe -i %i -vn "%~ni.wav" && py .\wav_to_txt.py "%~ni.wav"
:    Encode to HD .mp4 (h264+aac)
     for %i in (!&) do @%FFmpegPath%ffmpeg.exe -fflags +genpts -i %i -acodec aac -ab 256K -filter:v fps=25 -c:v h264_nvenc -rc:v vbr -qmin:v 10 -qmax:v 28 -preset p4 -tune hq -cq 18 -b:v 4000k -maxrate:v 10000k -bf:v 4 -rc-lookahead 5 -movflags use_metadata_tags "%~ni.mp4" && del /q %i
:    Create rename script
     for %i in (!&) do echo rename "%~nxi" "%~ni.tmp" >> trim.cmd
:    Encode to .mp4 (h264+aac)
     for %i in (!&) do @%FFmpegPath%ffmpeg.exe -fflags +genpts -i %i -acodec aac -ab 128K -filter:v fps=25 -c:v h264_nvenc -rc:v vbr -qmin:v 10 -qmax:v 28 -preset p4 -tune hq -cq 18 -b:v 2000k -maxrate:v 5000k -bf:v 4 -rc-lookahead 5 -movflags use_metadata_tags "%~ni.mp4" && del /q %i
:    Convert to .ts container
     for %i in (!&) do @%FFmpegPath%ffmpeg.exe -fflags +genpts -i %i -acodec copy -vcodec copy -sn "%~ni.ts" && if -!?Keep original?y!- == -n- del /q %i
